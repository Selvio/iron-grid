schema_version: "1.0.0"
document_version: "1.0.0"
document_status: "definitive-baseline"
document_purpose: >
  Canonical weapon definitions for the Iron Grid MVP. This file defines
  weapon identity, fire mode, range model, ammunition behavior, legal target
  classes, selection priority, counterattack behavior, visibility constraints,
  and rendering metadata. Matchup-specific base damage values are intentionally
  excluded and must be defined only in damage-chart.yaml.

game_reference:
  ruleset: "Advance Wars 2: Black Hole Rising"
  implementation_policy: >
    Weapon names are stable Iron Grid identifiers chosen to describe AW2-style
    behavior. A shared weapon name does not imply shared damage values; damage
    remains attacker-unit-versus-defender-unit data.
  important_rule: >
    Advance Wars does not calculate damage from generic weapon power. A weapon
    only determines whether and how an attack may occur. damage-chart.yaml
    determines the base percentage for each unit matchup.

source_references:
  - id: "wars-wiki-aw2-damage"
    type: "technical-reference"
    url: "https://warswiki.org/wiki/Damage/Advance_Wars_2_chart"
    covers:
      - primary_and_secondary_weapon_matchups
      - legal_targets
  - id: "wars-wiki-unit-pages"
    type: "technical-reference"
    base_url: "https://warswiki.org/wiki/"
    covers:
      - weapon_names
      - ammunition
      - ranges
      - target_categories
  - id: "awbw-unit-chart"
    type: "technical-reference"
    url: "https://awbw.amarriner.com/units.php"
    covers:
      - unit_ammo
      - ranges
  - id: "nintendo-aw2-manual"
    type: "primary-reference"
    url: "https://www.nintendo.com/eu/media/downloads/games_8/emanuals/game_boy_advance_8/Manual_GameBoyAdvance_AdvanceWars2BlackHoleRising_EN_DE_FR_ES_IT.pdf"
    covers:
      - attack_actions
      - direct_and_indirect_combat
      - ammunition
      - counterattacks

conventions:
  grid_distance: "manhattan"
  direct_range:
    min: 1
    max: 1
  attack_origin: "attacker_current_tile_after_any_valid_movement"
  authoritative_runtime: "server"
  damage_source: "damage-chart.yaml"
  random_source: "server-owned deterministic match RNG"
  ammo_storage: >
    Ammunition is stored on the unit instance as one primary-ammo pool.
    Weapons with ammo_consumption 1 consume that pool. Infinite-ammo weapons
    do not consume or require the pool.
  selection_policy:
    order:
      - primary
      - secondary
    rule: >
      Select the primary weapon when it has sufficient ammunition and has a
      non-null damage entry against the target's current target profile.
      Otherwise select the secondary weapon when it has a non-null damage entry.
      If neither weapon has a valid damage entry, the attack is illegal.
  counterattack_policy: >
    Only direct weapons may counterattack. The surviving defender must have a
    valid direct weapon against the attacker after receiving damage. Indirect
    weapons never counterattack.
  target_legality_policy: >
    target_domains and state rules provide coarse validation. The definitive
    legal matchup is a non-null entry in damage-chart.yaml for the attacking
    unit, selected weapon slot, and defending unit/state.
  line_of_sight:
    direct: "No separate line-of-sight ray; target must be orthogonally adjacent."
    indirect: >
      Range is Manhattan distance. Ordinary terrain and units do not block
      indirect fire. Fog-of-war visibility rules still apply to targetability.
  damage_to_zero_policy: >
    Normal weapon attacks may destroy units. Special map weapons such as the
    Missile Silo are not unit weapons and belong in rules.yaml.

enums:
  slots:
    - primary
    - secondary
  fire_modes:
    - direct
    - indirect
  ammo_models:
    - finite_primary_pool
    - infinite
  target_domains:
    - ground
    - air
    - naval
    - submarine
    - terrain_object
  target_altitudes:
    - surface
    - airborne
    - submerged
  effect_types:
    - kinetic
    - explosive
    - missile
    - rocket
    - bomb
    - torpedo
    - small_arms
    - anti_air
  animation_profiles:
    - small_arms
    - bazooka
    - cannon_direct
    - cannon_indirect
    - rocket_indirect
    - missile_indirect
    - vulcan
    - aircraft_missile
    - helicopter_missile
    - bomb
    - torpedo
    - naval_cannon
    - naval_anti_air

