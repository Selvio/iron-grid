selection_rules:
  resolve_weapon:
    inputs:
      - attacker_unit_type
      - attacker_ammo
      - attacker_special_state
      - defender_unit_type
      - defender_special_state
      - distance
      - attacker_moved_this_activation
      - visibility_result
    steps:
      - "Read the attacker unit's primary_weapon_id and secondary_weapon_id from units.yaml."
      - "Evaluate primary range, movement, state, visibility, domain, and damage-chart entry."
      - "Require sufficient ammo when primary uses finite_primary_pool."
      - "If primary is valid, select primary."
      - "Otherwise evaluate secondary."
      - "If secondary is valid, select secondary."
      - "Otherwise reject the attack."
    output:
      - selected_weapon_id
      - selected_slot
      - ammo_consumed
      - legal_damage_entry
  important_cases:
    mech:
      - "Bazooka is selected against armored targets when ammo exists."
      - "Machine Gun is selected against targets without a valid Bazooka entry."
      - "Machine Gun is used as fallback when Bazooka ammo is zero and its matchup is legal."
    tank_family:
      - "Cannon is selected when its damage entry exists and ammo is available."
      - "Machine Gun is used for eligible soft targets or as legal fallback."
    battle_copter:
      - "Air-to-Surface Missiles use finite ammo."
      - "Copter Machine Gun is infinite-ammo fallback for eligible targets."
    cruiser:
      - "Primary finite-ammo weapon attacks Submarines."
      - "Secondary infinite-ammo Anti-Air Gun attacks air units."
    no_secondary_units:
      - "An empty primary ammo pool makes the unit unable to attack."

cross_file_contracts:
  units_yaml:
    required_path: "units.yaml"
    rules:
      - "Every non-null primary_weapon_id and secondary_weapon_id must resolve here."
      - "Weapon slot must match its placement in the unit definition."
      - "Weapon range must match the unit combat range."
      - "Every used_by unit must reference the weapon."
  damage_chart_yaml:
    required_path: "damage-chart.yaml"
    rules:
      - "Every legal attack must have one explicit numeric base-damage entry."
      - "Every illegal attack must be null or absent according to the damage-chart schema."
      - "Damage values may differ even when units share the same weapon ID."
      - "Submarine surfaced/submerged targetability must be explicit."
  rules_yaml:
    required_path: "rules.yaml"
    rules:
      - "Damage formula, luck, rounding, and CO modifiers belong outside this file."
      - "Missile Silo is a map action, not a weapon in this file."
  assets:
    rules:
      - "No dedicated projectile or impact sprites are confirmed in the Pangea Wars pack."
      - "Null presentation assets require Phaser effects or separately approved asset work."

implementation_constraints:
  - "Do not derive base damage from effect_type, caliber, weapon name, domain, or role."
  - "Do not let the client choose the weapon slot."
  - "Do not permit indirect fire after movement unless a future explicit rule overrides it."
  - "Do not permit indirect counterattacks."
  - "Do not consume ammo for an invalid or rejected action."
  - "Consume ammo exactly once after a combat action commits."
  - "Counterattacks resolve weapon selection independently using defender post-hit state."
  - "Persist selected weapon ID and ammo before/after in replay events."
  - "A replay never reruns weapon selection against changed data."
  - "Active matches remain bound to their starting data version."

required_replay_fields:
  - attacker_unit_id
  - defender_unit_id
  - selected_weapon_id
  - selected_slot
  - attacker_ammo_before
  - attacker_ammo_after
  - attack_distance
  - attacker_moved_before_attack
  - attacker_special_state
  - defender_special_state
  - base_damage
  - luck_roll
  - final_damage
  - defender_hp_before
  - defender_hp_after

required_validation_tests:
  - "All weapon IDs referenced by units.yaml resolve."
  - "All weapon used_by references resolve to enabled units."
  - "Every primary weapon has finite_primary_pool ammo."
  - "Every secondary weapon has infinite ammo for the AW2 MVP roster."
  - "Every indirect weapon has can_fire_after_move false."
  - "Every indirect weapon has can_counterattack false."
  - "Every direct weapon has range 1-1."
  - "Artillery range is 2-3."
  - "Rockets and Missiles range is 3-5."
  - "Battleship range is 2-6."
  - "Cruiser primary targets Submarine only in AW2."
  - "Cruiser secondary targets air units."
  - "Submarine Torpedoes can target valid naval and submarine states."
  - "Bomber cannot target air units."
  - "Fighter cannot target ground or naval units."
  - "Missiles cannot target ground or naval units."
  - "No weapon contains generic base-power values."
  - "Every legal matchup is sourced from damage-chart.yaml."
