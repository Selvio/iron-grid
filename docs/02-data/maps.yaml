      - ["sea", "sea", "forest", "road", "road", "road", "road", "road", "road", "road", "road", "road", "base", "headquarters", "sea"]
      - ["sea", "plain", "plain", "road", "sea", "sea", "road", "plain", "city", "plain", "road", "base", "base", "base", "sea"]
      - ["sea", "city", "city", "road", "sea", "sea", "road", "forest", "plain", "mountain", "road", "plain", "plain", "plain", "sea"]
