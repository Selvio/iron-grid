publication_state:
  official_map_count: 1
  playable_map_count: 1
  mvp_minimum_required: 1
  status: "blocked"
  blockers:
    - "crossfire-basin balance is pending the two-human sign-off (status: review)."
    - "Reef, Pipe, Pipe Seam and Missile Silo remain asset-gated."
    - "Day-limit scoring is not implemented."
  allowed_next_step: >
    Complete the two-human balance review of crossfire-basin, then flip it to
    status: published / balance: approved to enable it.

cross_file_contracts:
  terrain_yaml:
    path: "terrain.yaml"
    requirements:
      - "Every logical terrain ID resolves."
      - "Published maps use only terrain with official_map_allowed true."
      - "Render tile IDs never substitute for logical terrain IDs."
  properties_yaml:
    path: "properties.yaml"
    requirements:
      - "Every property type resolves."
      - "Property terrain and property instance coordinates agree."
      - "Each player has exactly one Headquarters."
  units_yaml:
    path: "units.yaml"
    requirements:
      - "Every starting-unit type resolves and is enabled."
      - "Starting terrain is traversable for the unit."
      - "Cargo capacity and allowed cargo types are respected."
  commanders_yaml:
    path: "commanders.yaml"
    requirements:
      - "Maps use player slots and never hardcode faction or commander IDs."
  rules_yaml:
    path: "rules.yaml"
    requirements:
      - "Map version is locked into active match data version."
      - "Random first-player selection remains enabled."
      - "Day-limit option remains disabled until scoring is approved."

implementation_constraints:
  - "Do not invent an official map inside an implementation task."
  - "Do not publish maps with placeholder property art."
  - "Do not use faction colors as fixed starting-position identifiers."
  - "Do not allow host overrides for starting funds or starting units."
  - "Do not place blocked terrain in an official map."
  - "Do not derive gameplay terrain from render tile IDs."
  - "Do not mutate a published map version."
  - "Do not reuse an existing map ID for a materially changed layout."
  - "Do not assume rotational symmetry guarantees balance without simulation."
  - "Do not enable day-limit scoring before rules.yaml weights are defined."

required_validation_tests:
  - "Logical terrain row/column counts equal declared dimensions."
  - "Logical terrain cell count equals width × height."
  - "Every terrain ID resolves in terrain.yaml."
  - "Every used terrain is allowed in official maps."
  - "Every property ID is unique."
  - "Every property coordinate is unique."
  - "Every property type resolves in properties.yaml."
  - "Every property coordinate matches its logical terrain."
  - "Exactly one Headquarters belongs to player_1."
  - "Exactly one Headquarters belongs to player_2."
  - "No Headquarters is neutral."
  - "Every starting-unit ID is unique."
  - "Every starting-unit coordinate is unique."
  - "Every starting-unit type resolves and is enabled."
  - "Every starting unit can occupy its starting terrain."
  - "Cargo is valid and not duplicated on the board."
  - "Starting funds are non-negative integers."
  - "All referenced visual tile IDs resolve in the approved atlas."
  - "No faction or commander ID appears in map ownership."
  - "Published maps have approved balance review."
  - "Published map versions are immutable."
