    id: "crossfire-basin"
    version: "2.0.0"
    display_name: null
    status: "review"
    dimensions:
      width: 15
      height: 10
    player_slots:
      player_1:
        id: "player_1"
        headquarters_property_id: "hq_p1"
      player_2:
        id: "player_2"
        headquarters_property_id: "hq_p2"
    logical_terrain:
