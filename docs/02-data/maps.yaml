schema_version: "1.0.0"
document_version: "1.0.0"
document_status: "definitive-schema"
document_purpose: >
  Canonical official-map schema and validation contract for Iron Grid.
  This file defines the required structure of every official map (dimensions
  are declared per map and must match the terrain grid), player starts,
  terrain grid, render layers, property instances, starting units, starting
  funds, supported settings, balance requirements, map versioning, and
  release gates. The first official map is `crossfire-basin` (15×10 island).

game_reference:
  inspiration: "Advance Wars 2: Black Hole Rising"
  iron_grid_constraints:
    player_count: 2
    map_dimensions: "declared per map; terrain cell count must equal width × height"
    official_maps_only_in_mvp: true
    user_generated_maps_enabled: false
    map_editor_enabled: false
    first_player_selected_randomly: true
    maps_must_be_balanced_for_either_starting_player: true
  map_policy: >
    Maps may define terrain, properties, starting ownership, starting units
    and starting funds. Match hosts may not alter those map-owned values.

source_references:
  - id: "game-specification"
    path: "docs/01-specification/game-specification.md"
    authority: "map size, match settings and balance requirements"
  - id: "terrain"
    path: "docs/02-data/terrain.yaml"
    authority: "logical terrain behavior and asset gates"
  - id: "properties"
    path: "docs/02-data/properties.yaml"
    authority: "property types and instance rules"
  - id: "units"
    path: "docs/02-data/units.yaml"
    authority: "starting-unit types and state constraints"
  - id: "rules"
    path: "docs/02-data/rules.yaml"
    authority: "turn flow, fog, victory and data versioning"
  - id: "assets-inventory"
    path: "docs/01-specification/assets-inventory.md"
    authority: "render tile availability and blocked asset mappings"

conventions:
  coordinate_system:
    origin: "top_left"
    x_axis: "increases_right"
    y_axis: "increases_down"
    x_range_inclusive: "0 .. width-1"
    y_range_inclusive: "0 .. height-1"
  dimensions:
    width: "positive integer declared per map"
    height: "positive integer declared per map"
    tile_count: "width × height"
  logical_tile_key_format: "{x},{y}"
  render_layers:
    - base
    - transition
    - structure
    - ownership
    - decoration
    - fog
  player_slots:
    - player_1
    - player_2
  faction_independence:
    map_uses_player_slots_not_faction_ids: true
    reason: >
      Factions are selected later through commanders. A map must not bind a
      starting position to blue, green, red or yellow.
  ownership_values:
    - neutral
    - player_1
    - player_2
  unit_state:
    true_hp_default: 100
    fuel_default: "maximum"
    ammo_default: "maximum"
    has_acted_default: false
    special_state_default: null
    cargo_default: []
  property_state:
    capture_points_default: 20
    capturing_unit_default: null
  render_binding:
    logical_terrain_separate_from_render_tiles: true
    render_tile_id_pattern: "terrain_r{row}_c{column}"
  map_versioning:
    semantic_version_required: true
    published_versions_immutable: true
    active_matches_keep_original_version: true

enums:
  map_statuses:
    - draft
    - review
    - approved
    - published
    - retired
    - blocked
  map_sizes:
    - per_map_dimensions
  symmetry_types:
    - rotational_180
    - horizontal
    - vertical
    - none_balanced
  terrain_grid_encodings:
    - row_major_array
    - coordinate_dictionary
  victory_condition_ids:
    - headquarters_capture
    - army_elimination
    - day_limit_score
    - resignation
    - timeout_claim
  fog_options:
    - allowed
    - required
    - forbidden
  deadline_options:
    - 24_hours
    - 3_days
    - 7_days
    - none
  balance_review_statuses:
    - not_started
    - simulated
    - human_reviewed
    - approved
    - rejected

map_schema:
  required_fields:
    - id
    - version
    - display_name
    - status
    - dimensions
    - player_slots
    - logical_terrain
    - render_layers
    - properties
    - starting_units
    - starting_funds
    - supported_match_settings
    - balance
    - implementation
  id_rules:
    format: "lower_snake_case"
    globally_unique: true
    immutable_after_publish: true
  dimensions:
    width: 20
    height: 16
    must_match_global_fixed_size: true
  player_slots:
    count: 2
    required_ids:
      - player_1
      - player_2
  logical_terrain:
    required_tile_count: "width × height"
    allowed_encoding: "row_major_array"
    row_count: "equals dimensions.height"
    column_count_per_row: "equals dimensions.width"
    terrain_ids_source: "terrain.yaml"
  render_layers:
    required_layers:
      - base
    optional_layers:
      - transition
      - structure
      - ownership
      - decoration
    visual_tile_ids_source: "assets inventory and approved terrain atlas"
  properties:
    property_type_source: "properties.yaml"
    coordinates_must_match_property_terrain: true
    duplicate_coordinates_forbidden: true
  starting_units:
    unit_type_source: "units.yaml"
    duplicate_coordinates_forbidden: true
    unit_on_impassable_terrain_forbidden: true
    cargo_must_not_also_exist_on_board: true
  supported_match_settings:
    host_configurable:
      - fog_enabled
      - turn_deadline_option
      - day_limit
      - victory_conditions
    map_owned_not_host_configurable:
      - starting_funds
      - starting_units
      - property_ownership
      - terrain
  balance:
    first_player_independent: true
    review_required_before_publish: true

player_slot_schema:
  required_fields:
    - id
    - headquarters_property_id
    - starting_property_ids
    - starting_unit_ids
    - spawn_reference
  headquarters:
    exactly_one_required: true
    ownership_required: true
    neutral_forbidden: true
  spawn_reference:
    purpose: "UI camera focus and map preview only"
    must_be_in_bounds: true
    need_not_be_occupied: true

logical_terrain_schema:
  encoding: "row_major_array"
  example:
    - [plain, plain, road, road, plain, plain, plain, plain, sea, sea, sea, sea, plain, plain, plain, plain, road, road, plain, plain]
  validation:
    - "Exactly 16 rows."
    - "Exactly 20 terrain IDs per row."
    - "Every terrain ID resolves in terrain.yaml."
    - "Every placed terrain has official_map_allowed true."
    - "Transformed-only terrain cannot be placed unless explicitly allowed."
    - "Blocked terrain cannot be used in published maps."

render_layer_schema:
  base:
    required: true
    dimensions: "matches map width × height"
    null_values_allowed: false
    use: "Primary visual tile for every coordinate."
  transition:
    required: false
    dimensions: "matches map width × height"
    null_values_allowed: true
    use: "Coast, road, river and biome transition overlays."
  structure:
    required: false
    dimensions: "matches map width × height"
    null_values_allowed: true
    use: "Properties, pipes, silos and destructible terrain visuals."
  ownership:
    required: false
    dimensions: "matches map width × height"
    null_values_allowed: true
    use: "Neutral/player ownership flags, tints or overlays."
  decoration:
    required: false
    dimensions: "matches map width × height"
    null_values_allowed: true
    gameplay_effect: false
    use: "Purely cosmetic details."
  contract:
    - "Render layers never determine movement, defense, capture or visibility."
    - "Changing a render tile may not change logical terrain."
    - "All non-null visual tile IDs must resolve in the approved atlas mapping."

property_instance_schema:
  required_fields:
    - id
    - type_id
    - x
    - y
    - initial_owner
  optional_fields:
    - initial_capture_points
    - render_variant
  initial_owner_values:
    - neutral
    - player_1
    - player_2
  headquarters_rules:
    neutral_forbidden: true
    exactly_one_per_player: true
  coordinates:
    unique_among_properties: true
    must_match_logical_terrain_id: true
  initial_capture_points:
    default: 20
    only_full_value_allowed_at_match_start: true

starting_unit_schema:
  required_fields:
    - id
    - type_id
    - owner
    - x
    - y
  optional_fields:
    - true_hp
    - fuel
    - ammo
    - has_acted
    - special_state
    - cargo
  owner_values:
    - player_1
    - player_2
  defaults:
    true_hp: 100
    fuel: "maximum"
    ammo: "maximum"
    has_acted: false
    special_state: null
    cargo: []
  restrictions:
    enabled_units_only: true
    unique_instance_id: true
    unique_board_coordinate: true
    terrain_must_be_traversable: true
    owner_must_exist: true
    initial_capture_forbidden: true
    produced_this_turn_state_forbidden: true
  cargo:
    nested_transport_forbidden: true
    capacity_from_units_yaml: true
    allowed_types_from_units_yaml: true
    cargo_ids_unique: true
    cargo_coordinates_omitted: true

starting_funds_schema:
  required_fields:
    - player_1
    - player_2
  value_type: "non_negative_integer"
  balance_rule: "Values must be equal unless asymmetry is explicitly justified and approved."
  default_recommendation: 0
  host_override_allowed: false

supported_match_settings_schema:
  fog:
    policy:
      mode: "allowed"
      host_may_enable_or_disable: true
    map_may_override_to_required: true
    map_may_override_to_forbidden: true
  deadlines:
    allowed:
      - 24_hours
      - 3_days
      - 7_days
      - none
  day_limit:
    allowed: true
    default: null
    minimum: 1
    maximum: null
    implementation_status: "blocked_pending_scoring_formula"
  victory_conditions:
    required:
      - headquarters_capture
      - army_elimination
      - resignation
      - timeout_claim
    optional:
      - day_limit_score
    unsupported_custom_objectives: true

balance_schema:
  required_fields:
    - symmetry_type
    - first_player_independent
    - metrics
    - opening_simulations
    - human_review
    - status
  metrics:
    required:
      - starting_army_value_difference
      - starting_funds_difference
      - owned_property_count_difference
      - neutral_property_distance_difference
      - production_property_distance_difference
      - headquarters_route_difference
      - defensive_terrain_access_difference
      - naval_access_difference
      - air_access_difference
      - chokepoint_control_difference
  acceptable_thresholds:
    starting_army_value_difference: 0
    starting_funds_difference: 0
    headquarters_count_difference: 0
    owned_property_count_difference: 0
    neutral_property_distance_difference: "must be justified by equivalent compensation"
    production_property_distance_difference: "must be justified by equivalent compensation"
  opening_simulations:
    required: true
    minimum_scripted_openings_per_start_position: 10
    swap_starting_player_required: true
    deterministic_engine_version_required: true
    record:
      - property_capture_timing
      - funds_by_day
      - produced_units_by_day
      - first_combat_day
      - army_value_by_day
      - headquarters_threat_day
  human_review:
    required: true
    reviewers_minimum: 2
    blind_position_swap_recommended: true
  publication:
    requires_status: "approved"
    unresolved_material_advantage_forbidden: true

official_map_release_gates:
  data:
    - "Map YAML validates against this schema."
    - "Logical terrain cell count equals width × height."
    - "Every ID and cross-reference resolves."
    - "Exactly two player slots exist."
    - "Exactly one Headquarters belongs to each player."
    - "No disabled unit or blocked terrain is used."
  assets:
    - "Every logical terrain has an approved render mapping."
    - "Every property has approved neutral/player ownership visuals."
    - "No placeholder art remains in published map."
  gameplay:
    - "Map supports the full intended roster used by its design."
    - "Starting units and funds are symmetric or explicitly compensated."
    - "Random first player does not create an unmitigated structural advantage."
    - "Fog-on and fog-off behavior are both reviewed when both are allowed."
  testing:
    - "Pathfinding reaches all intended areas."
    - "No production property is permanently unusable."
    - "No unit starts on invalid terrain."
    - "No property coordinate conflicts with another entity."
    - "All scripted opening simulations pass."
    - "Two human reviewers approve balance."
  versioning:
    - "Published map version is immutable."
    - "Any layout or balance change creates a new semantic version."

map_template:
  id: null
  version: "0.1.0"
  display_name: null
  description: null
  status: "draft"
  dimensions:
    width: null
    height: null
  player_slots:
    player_1:
      id: "player_1"
      headquarters_property_id: null
      starting_property_ids: []
      starting_unit_ids: []
      spawn_reference:
        x: null
        y: null
    player_2:
      id: "player_2"
      headquarters_property_id: null
      starting_property_ids: []
      starting_unit_ids: []
      spawn_reference:
        x: null
        y: null
  logical_terrain: []
  render_layers:
    base: []
    transition: []
    structure: []
    ownership: []
    decoration: []
  properties: []
  starting_units: []
  starting_funds:
    player_1: 0
    player_2: 0
  supported_match_settings:
    fog:
      mode: "allowed"
      default_enabled: false
    deadlines:
      - 24_hours
      - 3_days
      - 7_days
      - none
    day_limit:
      enabled: false
      default: null
    victory_conditions:
      - headquarters_capture
      - army_elimination
      - resignation
      - timeout_claim
  balance:
    symmetry_type: null
    first_player_independent: true
    metrics:
      starting_army_value_difference: null
      starting_funds_difference: 0
      owned_property_count_difference: null
      neutral_property_distance_difference: null
      production_property_distance_difference: null
      headquarters_route_difference: null
      defensive_terrain_access_difference: null
      naval_access_difference: null
      air_access_difference: null
      chokepoint_control_difference: null
    opening_simulations:
      status: "not_started"
      engine_version: null
      scenarios: []
    human_review:
      status: "not_started"
      reviewers: []
      notes: []
    status: "not_started"
  implementation:
    enabled_in_mvp: false
    blockers:
      - map_layout_not_created
      - property_art_not_approved
      - balance_not_reviewed
    acceptance_tests: []

official_maps:
  # Island skirmish reconstructed from the visual reference (15×10). player_1
  # starts NE (Blue), player_2 SW (Red). Visual bridges are logical `road`.
