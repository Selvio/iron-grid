schema_version: "1.0.0"
document_version: "1.0.0"
document_status: "definitive-baseline"
document_purpose: >
  Canonical property definitions for the Iron Grid MVP. This file defines
  ownership, income, capture, repair, resupply, production, headquarters
  defeat behavior, property vision contribution, rendering ownership states,
  and validation contracts. Terrain traversal and defense values remain in
  terrain.yaml and must not be duplicated here.

game_reference:
  ruleset: "Advance Wars 2: Black Hole Rising"
  property_policy: >
    Reproduce AW2 property behavior while preserving Iron Grid's
    server-authoritative asynchronous match model.
  ownership_policy: >
    Capturable properties may be neutral or owned by exactly one active player.
    Headquarters must always belong to a player once a match begins.
  income_policy: "Owned income-producing properties grant 1000 funds at the start of the owner's turn."
  capture_policy: "Capturable properties have 20 capture points and are captured by Infantry or Mech using displayed HP."
  repair_policy: >
    Compatible units on owned properties may repair up to 2 displayed HP at
    the start of the owner's turn, subject to available funds, and are
    resupplied according to the approved AW2 behavior.
  production_policy: >
    Bases produce ground units, Airports produce air units, and Ports produce
    naval units. Produced units appear immediately at full state and are marked
    as already acted.

source_references:
  - id: "nintendo-aw2-manual"
    type: "primary-reference"
    url: "https://www.nintendo.com/eu/media/downloads/games_8/emanuals/game_boy_advance_8/Manual_GameBoyAdvance_AdvanceWars2BlackHoleRising_EN_DE_FR_ES_IT.pdf"
    covers:
      - property_income
      - capture
      - production
      - repair
      - resupply
      - headquarters_capture
  - id: "awbw-properties"
    type: "technical-reference"
    url: "https://awbw.fandom.com/wiki/Properties"
    covers:
      - defense_stars
      - capture_points
      - production_categories
      - income
      - repair_categories
  - id: "project-game-specification"
    type: "project-reference"
    path: "docs/01-specification/game-specification.md"
    covers:
      - match_specific_overrides
      - asynchronous_timing
      - replay
      - concurrency
  - id: "pangea-assets-inventory"
    type: "project-reference"
    path: "docs/01-specification/assets-inventory.md"
    covers:
      - building_candidates
      - ownership_visual_gaps
      - asset_gating

conventions:
  capture:
    default_max_points: 20
    eligible_unit_ids:
      - infantry
      - mech
    progress_per_action_formula: "capturing_unit.displayed_hp"
    reset_conditions:
      - capturing_unit_leaves
      - capturing_unit_destroyed
      - property_owner_changes
      - capturing_unit_replaced
      - match_ends
    persists_through_damage: true
    completion_rule: "capture_points_remaining <= 0"
  income:
    amount_per_property: 1000
    timing: "start_of_owner_turn"
    server_authoritative: true
  repair:
    max_displayed_hp_per_turn: 2
    cost_percent_per_displayed_hp: 10
    timing: "start_of_owner_turn"
    partial_repair_allowed: true
    funds_may_not_go_negative: true
    true_hp_per_displayed_hp: 10
    selection_policy: >
      Process units in deterministic tile order unless rules.yaml defines a
      different explicit ordering. Each unit may repair only whole displayed
      HP increments that can be paid.
  resupply:
    timing: "start_of_owner_turn"
    fuel_to_maximum: true
    ammo_to_maximum: true
    occurs_when_repair_is_zero: true
    occurs_when_funds_are_zero: true
  production:
    created_true_hp: 100
    created_with_full_fuel: true
    created_with_full_ammo: true
    created_unit_has_acted: true
    property_tile_must_be_empty: true
    sufficient_funds_required: true
    cost_source: "units.yaml"
  ownership:
    neutral_owner: null
    single_owner_only: true
    ownership_change_is_immediate: true
  vision:
    property_contribution_enabled: true
    owned_property_vision_range: 1
    neutral_property_vision_range: 0
    enemy_property_vision_range: 0
    note: >
      The exact property-vision rule must match the final fog implementation.
      This value is explicit so it can be validated rather than inferred.
  rendering:
    ownership_states:
      - neutral
      - blue
      - green
      - red
      - yellow
    ownership_overlay_required: true
    capture_progress_ui_required: true

enums:
  property_types:
    - city
    - base
    - airport
    - port
    - headquarters
  ownership_states:
    - neutral
    - player_owned
  production_categories:
    - none
    - ground
    - air
    - naval
  repair_categories:
    - ground
    - air
    - naval
  capture_outcomes:
    - ownership_changed
    - headquarters_defeat
  asset_statuses:
    - confirmed
    - mapping_required
    - derivative_art_required
    - blocked

