property_state_model:
  instance_fields:
    - id
    - property_type_id
    - x
    - y
    - owner_player_id
    - capture_points_remaining
    - capturing_unit_id
    - map_definition_id
  initial_values:
    capture_points_remaining: 20
    capturing_unit_id: null
  invariants:
    - "owner_player_id is null only when the property type allows neutral ownership."
    - "capture_points_remaining is an integer from 1 to max_capture_points unless completion is being resolved atomically."
    - "capturing_unit_id references an active Infantry or Mech on the property tile."
    - "A property cannot be captured by more than one unit simultaneously."
    - "Property ownership changes and capture reset occur in the same transaction."

capture_resolution:
  prerequisites:
    - "match.status is active"
    - "requesting player is active player"
    - "unit belongs to requesting player"
    - "unit type is Infantry or Mech"
    - "unit occupies property tile"
    - "property is capturable"
    - "property is not already owned by unit owner"
    - "unit has not acted"
  steps:
    - "If capturing_unit_id differs from the acting unit, initialize or replace capture attempt according to reset rules."
    - "Subtract acting unit displayed HP from capture_points_remaining."
    - "Mark unit as acted."
    - "Persist capture progress event."
    - "If capture_points_remaining is greater than zero, retain the same capturing_unit_id."
    - "If capture_points_remaining is zero or lower, change owner immediately."
    - "Reset capture_points_remaining to max_capture_points."
    - "Clear capturing_unit_id."
    - "Recalculate property income ownership and fog projection."
    - "If Headquarters, complete match immediately."
  replay_events:
    - capture_started
    - capture_progressed
    - property_captured
    - headquarters_captured
    - match_completed

start_of_turn_property_processing:
  deterministic_order:
    - "Sort owned properties by y ascending, then x ascending, then property instance ID."
    - "Grant total income."
    - "Process compatible unit repair/resupply in the same deterministic tile order."
  income:
    formula: "sum(property.economy.income_per_turn for all owned properties)"
    event: "income_granted"
  repair:
    target_condition: "compatible allied unit begins turn on owned property"
    max_displayed_hp: 2
    true_hp_per_step: 10
    step_cost_formula: "unit.cost * 0.10"
    algorithm:
      - "Determine missing true HP."
      - "Determine maximum whole displayed-HP repair steps, capped at 2."
      - "Determine affordable steps from current funds."
      - "Repair min(missing steps, 2, affordable steps)."
      - "Deduct funds atomically."
      - "Clamp true HP to 100."
    event: "unit_repaired"
  resupply:
    algorithm:
      - "Set compatible unit fuel to unit maximum."
      - "Set compatible unit primary ammo to unit maximum."
      - "Resupply occurs even when no HP is repaired."
      - "Resupply does not deduct funds."
    event: "unit_resupplied"

production_resolution:
  prerequisites:
    - "match.status is active"
    - "requesting player is active player"
    - "property belongs to requesting player"
    - "property production category is not none"
    - "selected unit is listed in allowed_unit_ids"
    - "selected unit production property matches this property"
    - "property tile is empty"
    - "player has sufficient funds"
    - "unit is enabled for the active data version"
  steps:
    - "Read cost from units.yaml."
    - "Deduct funds."
    - "Create unit at property coordinates."
    - "Set true HP to 100."
    - "Set fuel and ammo to unit maxima."
    - "Set has_acted true."
    - "Persist unit and state version."
    - "Recalculate visibility."
    - "Emit unit_produced."
  failure_codes:
    - property_not_owned
    - wrong_active_player
    - property_occupied
    - unsupported_unit_category
    - unit_not_allowed
    - insufficient_funds
    - disabled_unit
    - stale_state_version

rendering_contract:
  source_issue: >
    The Pangea Wars package does not provide a clearly labeled four-faction
    property sheet. Property semantics and ownership states therefore require
    explicit mapping or approved derivative overlays.
  required_visual_states:
    city:
      - neutral
      - blue
      - green
      - red
      - yellow
    base:
      - neutral
      - blue
      - green
      - red
      - yellow
    airport:
      - neutral
      - blue
      - green
      - red
      - yellow
    port:
      - neutral
      - blue
      - green
      - red
      - yellow
    headquarters:
      - blue
      - green
      - red
      - yellow
  capture_progress:
    rendered_in_html_or_canvas: true
    must_show:
      - remaining_capture_points
      - capturing_faction
    must_not_reveal_under_fog:
      - hidden_enemy_capture_when_property_is_not_visible

cross_file_contracts:
  terrain_yaml:
    path: "terrain.yaml"
    requirements:
      - "Each property terrain gameplay.property_id resolves here."
      - "Defense stars and movement costs remain authoritative in terrain.yaml."
      - "Terrain official_map_allowed must remain false until property art is approved."
  units_yaml:
    path: "units.yaml"
    requirements:
      - "Production allowed_unit_ids must resolve to enabled units."
      - "Each produced unit's production.property must match the property type."
      - "Repair categories must match unit category."
      - "Infantry and Mech are the only capture-capable units."
  maps_yaml:
    path: "maps.yaml"
    requirements:
      - "Each property instance references one property type here."
      - "Each player has exactly one Headquarters."
      - "Neutral Headquarters are forbidden."
      - "Property coordinates match the terrain grid."
  rules_yaml:
    path: "rules.yaml"
    requirements:
      - "Start-of-turn sequencing and victory timing reference this file."
      - "Funds, capture and production transactions use match state versioning."
  game_specification:
    path: "game-specification.md"
    requirements:
      - "Any future gameplay difference must be documented before changing this file."

implementation_constraints:
  - "Do not duplicate property defense stars or terrain movement costs here."
  - "Do not trust client-provided owner, price, capture value, repair value or allowed unit list."
  - "Do not allow production on an occupied property."
  - "Do not allow neutral properties to repair, resupply or produce."
  - "Do not allow enemy-owned properties to benefit an occupying unit."
  - "Do not charge funds for fuel or ammo resupply."
  - "Do not apply fractional displayed-HP repair steps."
  - "Do not let capture progress survive the capturing unit leaving or being destroyed."
  - "Do not delay Headquarters victory until End Turn."
  - "Do not expose hidden capture progress through replay or API responses."
  - "Active matches remain bound to their initial property-data version."

required_validation_tests:
  - "Exactly five property types exist."
  - "Every property ID is unique."
  - "Every property terrain_id resolves in terrain.yaml."
  - "City, Base, Airport, Port and Headquarters have 20 capture points."
  - "Every property grants 1000 income when owned."
  - "Only Base, Airport and Port produce units."
  - "Base produces exactly the 11 enabled ground units."
  - "Airport produces exactly the 4 enabled air units."
  - "Port produces exactly the 4 enabled naval units."
  - "City and Headquarters do not produce units."
  - "City, Base and Headquarters repair and resupply ground units."
  - "Airport repairs and resupplies air units."
  - "Port repairs and resupplies naval units."
  - "Neutral properties do not produce, repair, resupply or grant income."
  - "Infantry and Mech are the only capture-capable units."
  - "A 10-HP capturer completes a neutral property in two uninterrupted capture actions."
  - "A damaged 6-HP capturer removes 6 capture points."
  - "Capture resets when the capturing unit leaves."
  - "Capture resets when the capturing unit is destroyed."
  - "Ownership changes immediately when capture points reach zero."
  - "Headquarters capture immediately completes the match."
  - "Produced unit is full HP, fuel and ammo and has acted."
  - "Production fails when property is occupied."
  - "Repair restores at most 2 displayed HP."
  - "Repair cost equals 10 percent of unit cost per displayed HP."
  - "Repair is partial when funds are insufficient."
  - "Resupply occurs even if no repair can be afforded."
  - "All property visual states required by rendering_contract are accounted for."
