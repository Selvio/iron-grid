modifier_schema:
  required_fields:
    - id
    - target
    - operation
    - value
    - scope
    - priority
  optional_fields:
    - conditions
    - duration
    - source
  example:
    id: "example_air_attack_bonus"
    target: "attack"
    operation: "multiply"
    value: 1.10
    scope:
      type: "unit_categories"
      values:
        - air
    conditions:
      owner_only: true
      active_power_required: false
    priority: 100

effect_schema:
  required_fields:
    - id
    - type
    - targeting
    - parameters
    - resolution_order
  example:
    id: "example_heal"
    type: "heal_units"
    targeting:
      model: "global_owned_units"
      scope:
        type: "all_units"
        values: []
    parameters:
      true_hp_amount: 10
      max_true_hp: 100
    resolution_order: 100

meter_schema:
  required_fields:
    - max_points
    - initial_points
    - power_cost
    - gain_rules
    - overflow_policy
    - cost_growth_rule
  unresolved_fields:
    - points_per_star
    - damage_dealt_multiplier
    - damage_received_multiplier
    - repeated_use_cost_growth
  canonical_constraint: >
    No commander may be enabled until all meter fields are numeric and
    validated by deterministic tests.

power_schema:
  required_fields:
    - id
    - display_name
    - cost
    - duration
    - immediate_effects
    - temporary_modifiers
    - activation_conditions
    - deactivation_conditions
  activation_conditions:
    required:
      - match_active
      - owner_is_active_player
      - meter_at_least_cost
      - power_not_already_active
      - power_not_used_this_turn
  resolution_order:
    - validate_activation
    - deduct_meter
    - apply_immediate_effects
    - register_temporary_modifiers
    - recalculate_visibility_if_required
    - recalculate_legal_actions_if_required
    - emit_power_activated
    - increment_state_version

commander_template:
  required_fields:
    - id
    - display_name
    - faction_id
    - status
    - passive
    - meter
    - power
    - visual
    - implementation
  passive:
