    - capture_power
    - property_income
    - terrain_defense_stars
    - luck_min
    - luck_max
    - bad_luck_min
    - bad_luck_max
    - power_meter_gain
  modifier_operations:
    - add
    - multiply
    - set
    - min
    - max
  effect_types:
    - heal_units
    - damage_units
    - resupply_units
    - grant_funds
    - drain_funds
    - reveal_tiles
    - hide_units
    - alter_terrain
    - move_units
    - reset_unit_actions
    - modify_capture_progress
    - set_weather
  trigger_types:
    - always
    - owner_turn_start
    - owner_turn_end
    - before_combat
    - after_combat
    - after_unit_destroyed
    - after_property_captured
    - power_activated
  meter_sources:
    - damage_dealt_value
    - damage_received_value
    - unit_destroyed_value
    - property_captured
    - fixed_per_turn
  targeting_models:
    - global_owned_units
    - global_enemy_units
    - all_units
    - selected_unit
    - selected_area
    - units_matching_scope
  portrait_statuses:
    - missing
    - placeholder
    - approved

