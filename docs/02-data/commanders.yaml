schema_version: "1.0.0"
document_version: "1.0.0"
document_status: "design-blocked"
document_purpose: >
  Canonical commander and faction schema for the Iron Grid MVP. This file
  defines the complete data model, faction bindings, power-meter contract,
  modifier vocabulary, effect vocabulary, validation rules, and the four
  required commander slots. Commander names, portraits, passive abilities,
  power effects and meter costs are intentionally unresolved because they
  were not defined in the approved design conversation. Implementation agents
  must not invent those values.

game_reference:
  inspiration: "Advance Wars 2: Black Hole Rising"
  iron_grid_override:
    commander_count: 4
    one_commander_per_faction: true
    passive_abilities_per_commander: 1
    powers_per_commander: 1
    super_powers_enabled: false
    duplicate_commander_selection_allowed: false
    duplicate_faction_selection_allowed: false
  design_policy: >
    Commanders provide all faction gameplay differences. Factions themselves
    are visual only.

source_references:
  - id: "game-specification"
    path: "docs/01-specification/game-specification.md"
    authority: "commander scope and unresolved design blockers"
  - id: "rules"
    path: "docs/02-data/rules.yaml"
    authority: "activation, replay, determinism and match-flow integration"
  - id: "units"
    path: "docs/02-data/units.yaml"
    authority: "unit IDs, categories and stat vocabulary"
  - id: "assets-inventory"
    path: "docs/01-specification/assets-inventory.md"
    authority: "four available faction unit palettes"

conventions:
  authoritative_runtime: "server"
  hardcoded_commander_name_checks_forbidden: true
  modifier_application: "declarative"
  active_match_data_version_locked: true
  faction_identity:
    determined_by_commander: true
    gameplay_modifiers_from_faction: false
  selection:
    first_picker: "server_random"
    second_picker_sees_first_choice: true
    both_players_ready_required: true
  meter:
    storage_unit: "integer_points"
    minimum: 0
    overflow_policy: "preserve unless power definition explicitly consumes all"
    client_calculation_authoritative: false
  power:
    activation: "manual"
    consumes_unit_action: false
    may_activate_once_per_turn: true
    allowed_only_during_owner_turn: true
    activation_persists_immediately: true
    replay_event_required: true
  percentages:
    baseline_attack: 100
    baseline_defense: 100
    baseline_income: 100
    baseline_capture: 100
    baseline_repair_cost: 100
  duration_models:
    - instantaneous
    - until_end_of_current_turn
    - until_start_of_next_owner_turn
    - fixed_owner_turns
  stacking:
    passive_with_power: "stack according to modifier operation and priority"
    multiple_powers: "not possible for one commander in MVP"
    source_order_required: true

enums:
  faction_ids:
    - blue
    - green
    - red
    - yellow
  commander_statuses:
