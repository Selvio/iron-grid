selection_rules:
  prerequisites:
    - match_status_is_commander_selection
    - player_is_match_member
    - player_has_not_locked_selection
  first_picker:
    determined_by: "server_random"
    may_select:
      - commander_blue
      - commander_green
      - commander_red
      - commander_yellow
  second_picker:
    sees_first_selection: true
    cannot_select_first_commander: true
    cannot_select_first_faction: true
  locking:
    selection_may_change_before_lock: true
    locked_selection_is_immutable: true
    both_locked_transitions_to_ready_check: true

modifier_resolution:
  ordered_steps:
    - load_base_unit_or_rule_value
    - apply_passive_set_operations
    - apply_passive_multiply_operations
    - apply_passive_add_operations
    - apply_power_set_operations
    - apply_power_multiply_operations
    - apply_power_add_operations
    - apply_min_and_max_constraints
    - round_according_to_target_rule
  priority:
    lower_number_first: true
    equal_priority_tie_breaker: "modifier_id lexical ascending"
  safeguards:
    attack_minimum: 0
    defense_minimum: 0
    movement_points_minimum: 0
    vision_range_minimum: 0
    unit_cost_minimum: 0
    property_income_minimum: 0
    luck_range_must_remain_valid: true

meter_resolution:
  event_inputs:
    - attacker_unit_cost
    - defender_unit_cost
    - attacker_true_hp_damage
    - defender_true_hp_damage
    - unit_destroyed
    - property_captured
  deterministic: true
  arithmetic: "integer-only after defined rounding"
  replay_fields:
    - meter_before
    - meter_gained
    - meter_after
    - source_event_id
  implementation_status: "blocked"
  blocker: "Exact Iron Grid meter formula and repeated-use behavior are not approved."

power_resolution:
  replay_event: "power_activated"
  event_fields:
    - commander_id
    - power_id
    - meter_before
    - cost
    - meter_after
    - immediate_effect_results
    - active_modifier_ids
    - duration
  fog_safety:
    hidden_targets_must_not_leak: true
    player_projection_required: true
  concurrency:
    expected_state_version_required: true
    activation_atomic: true
    duplicate_idempotency_key_returns_original_result: true

cross_file_contracts:
  rules_yaml:
    path: "rules.yaml"
    requirements:
      - "commander_count must remain 4."
      - "one_per_faction must remain true."
      - "super_power_enabled must remain false."
      - "activate_power remains blocked until every commander is approved."
  units_yaml:
    path: "units.yaml"
    requirements:
      - "All unit_ids used by modifier scopes must resolve."
      - "All unit categories and movement types must use units.yaml vocabulary."
  terrain_yaml:
    path: "terrain.yaml"
    requirements:
      - "All terrain_ids used by modifier scopes must resolve."
  properties_yaml:
    path: "properties.yaml"
    requirements:
      - "All property_ids used by modifier scopes must resolve."
  maps_yaml:
    path: "maps.yaml"
    requirements:
      - "Map definitions may not hardcode commander bonuses."
  game_specification:
    path: "game-specification.md"
    requirements:
      - "Commander design must be approved there before null fields are populated."

implementation_constraints:
  - "Do not enable a commander with null name, passive, power cost or meter rules."
  - "Do not infer commander effects from faction color."
  - "Do not copy Nintendo commander names, portraits or narrative."
  - "Do not hardcode checks such as commander.id === a specific name in engine logic."
  - "Do not add faction bonuses outside commander data."
  - "Do not let the client calculate authoritative meter gain."
  - "Do not activate a power when meter is insufficient."
  - "Do not allow duplicate commander or faction selection."
  - "Do not expose hidden power targets or effects through replay projections."
  - "Active matches remain bound to the starting commander-data version."

design_requirements_before_approval:
  per_commander:
    - original_display_name
    - faction_display_name
    - gameplay_archetype
    - one_clear_strength
    - one_meaningful_weakness
    - passive_name
    - passive_description
    - passive_structured_modifiers
    - power_name
    - power_description
    - power_cost
    - meter_gain_formula
    - power_duration
    - immediate_effects
    - temporary_modifiers
    - portrait
    - power_icon
    - at_least_ten_acceptance_tests
  global_balance:
    - no_commander_is_strictly_better_in_all_situations
    - each_commander_has_counterplay
    - bonuses_use_existing_engine_vocabulary
    - no_effect_requires_undocumented_gameplay_system
    - mirrorless_1v1_matchups_are_reviewed
    - all_six_commander_pairings_are_tested
    - early_game_property_timing_is_tested
    - land_air_naval_map_performance_is_tested

required_validation_tests:
  - "Exactly four factions exist."
  - "Exactly four commander slots exist."
  - "Every faction references exactly one commander."
  - "Every commander references exactly one faction."
  - "Faction gameplay_modifiers arrays are empty."
  - "No commander is enabled while status is blocked."
  - "No commander is enabled with null display_name."
  - "No commander is enabled with null power cost."
  - "No commander is enabled with unresolved meter gain rules."
  - "Duplicate commander selection is rejected."
  - "Duplicate faction selection is rejected."
  - "Second picker cannot choose the first picker's commander."
  - "Modifier targets, operations, scopes and duration models use declared enums."
  - "Every unit, terrain or property scope reference resolves in its canonical file."
  - "Meter changes are deterministic and persisted in replay events."
  - "Power activation rejects insufficient meter."
  - "Power activation rejects stale state version."
  - "Power activation cannot leak hidden targets under fog."
  - "No Super Power field is required or enabled."
