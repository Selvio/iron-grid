schema_version: "1.0.0"
document_version: "1.0.0"
document_status: "definitive-baseline"
document_purpose: >
  Canonical logical terrain definitions for the Iron Grid MVP. This file
  defines defense stars, traversal costs, fog behavior, terrain-object state,
  rendering constraints, and cross-file validation. Property economy,
  production, capture, repair and ownership rules are defined in
  properties.yaml and referenced here.

game_reference:
  ruleset: "Advance Wars 2: Black Hole Rising"
  terrain_policy: >
    Reproduce AW2 terrain behavior. Terrain types whose Pangea Wars artwork is
    not yet conclusively mapped remain data-defined but blocked from official
    production maps until their visual asset status is approved.
  weather_policy: "No weather system in the MVP."

source_references:
  - id: "nintendo-aw2-manual"
    type: "primary-reference"
    url: "https://www.nintendo.com/eu/media/downloads/games_8/emanuals/game_boy_advance_8/Manual_GameBoyAdvance_AdvanceWars2BlackHoleRising_EN_DE_FR_ES_IT.pdf"
    covers:
      - terrain_roles
      - fog_behavior
      - properties
      - pipes
      - missile_silos
  - id: "awbw-terrain"
    type: "technical-reference"
    url: "https://awbw.fandom.com/wiki/Terrain"
    covers:
      - defense_stars
      - movement_costs
      - vision_effects
      - pipe_seam_equivalence
  - id: "awbw-properties"
    type: "technical-reference"
    url: "https://awbw.fandom.com/wiki/Properties"
    covers:
      - property_defense
      - property_movement
      - capture_points
      - missile_silo_effect
  - id: "pangea-assets-inventory"
    type: "project-reference"
    path: "docs/01-specification/assets-inventory.md"
    covers:
      - terrain_atlas_geometry
      - asset_confidence
      - blocked_visual_mappings

conventions:
  tile_grid:
    source_tile_width_px: 24
    source_tile_height_px: 24
    recommended_render_scale: 2
    logical_map_width: 20
    logical_map_height: 16
  movement:
    impassable: null
    path_metric: "orthogonal"
    entry_cost_policy: "Pay the cost of the destination tile."
    fuel_policy: "Movement fuel is consumed per traversed tile, not by movement-point cost."
    air_policy: >
      Air pays 1 on all ordinary traversable terrain and receives no terrain
      defense. Pipes and intact Pipe Seams remain impassable to air.
  defense:
    applies_to:
      - ground
      - naval
    excludes:
      - air
    formula_reference: "game-specification.md"
    description: >
      Each defense star contributes defense scaled by the defender's displayed
      HP. Terrain defense never applies to air units.
  visibility:
    ordinary_tiles_reveal_normally: true
    hidden_terrain_requires_adjacency: true
    adjacency_metric: "orthogonal"
  rendering:
    logical_terrain_separate_from_render_tile: true
    render_tile_id_format: "terrain_r{row}_c{column}"
    overlays_allowed: true
  property_link:
    definitions_file: "properties.yaml"
    terrain_records_store_property_id_only: true

enums:
  terrain_groups:
    - land
    - water
    - structure
    - property
    - special
  movement_types:
    - foot
    - mech
    - tires
    - treads
    - air
    - ship
    - transport_ship
  unit_domains:
    - ground
    - air
    - naval
  fog_concealment:
    - none
    - ground
    - naval
  asset_statuses:
    - confirmed
    - mapping_required
    - derivative_art_required
    - blocked
  state_models:
    - static
    - destructible
    - single_use
    - transformed

