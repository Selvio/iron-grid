cross_file_contracts:
  units_yaml:
    path: "units.yaml"
    requirements:
      - "Every enabled unit movement.type must exist in enums.movement_types."
      - "Every unit path uses this file's movement cost."
      - "Air units must ignore defense stars even when standing on property terrain."
      - "Infantry and Mech are the only units eligible for Mountain vision bonus."
  properties_yaml:
    path: "properties.yaml"
    requirements:
      - "Every non-null gameplay.property_id must resolve."
      - "Income, production, repair, capture and ownership are property data, not duplicated here."
      - "Property defense stars and movement values must match this file."
  maps_yaml:
    path: "maps.yaml"
    requirements:
      - "Every logical tile ID must resolve here."
      - "Production maps may use only official_map_allowed terrain."
      - "broken_pipe_seam may result from gameplay but must not be placed unless a map explicitly requires a pre-broken state."
  damage_chart_yaml:
    path: "damage-chart.yaml"
    requirements:
      - "pipe_seam must resolve as the special defender ID."
  rules_yaml:
    path: "rules.yaml"
    requirements:
      - "Missile Silo radius, damage and minimum remaining HP belong there."
      - "Fog projection and hidden collision timing belong there."
      - "Pipe Seam destruction timing belongs there."

implementation_constraints:
  - "Never use render tile IDs as gameplay terrain IDs."
  - "Never infer movement cost from visuals."
  - "Never grant terrain defense to air units."
  - "Do not allow diagonal movement."
  - "Do not allow ordinary units onto Pipe or intact Pipe Seam."
  - "Do not place visually blocked terrain in official maps."
  - "Recalculate visibility after movement, destruction, load/unload, capture, production, power effects and terrain transformation."
  - "Changing a render tile variant must not modify gameplay."
  - "Terrain data for active matches is version-locked."

required_validation_tests:
  - "Every terrain ID is unique."
  - "Every movement-cost key is a supported movement type."
  - "Plain costs Foot 1, Mech 1, Tires 2, Treads 1, Air 1."
  - "Forest costs Foot 1, Mech 1, Tires 3, Treads 2, Air 1."
  - "Mountain costs Foot 2, Mech 1 and is impassable to Tires and Treads."
  - "River costs Foot 2, Mech 1 and is impassable to Tires and Treads."
  - "Road and Bridge cost 1 for all ground movement types."
  - "Sea costs Ship 1 and Transport Ship 1."
  - "Reef costs Ship 2 and Transport Ship 2."
  - "Shoal costs 1 for all ground types and Transport Ship, but is impassable to Ship."
  - "Pipe and intact Pipe Seam are impassable to every MVP movement type, including Air."
  - "Broken Pipe Seam has the same gameplay values as Plain."
  - "Forest hides ground units under fog."
  - "Reef hides naval units under fog."
  - "Mountain grants +3 vision only to Infantry and Mech."
  - "Air receives no concealment from Forest or Reef."
  - "City, Base, Airport and Port have 3 defense stars."
  - "Headquarters has 4 defense stars."
  - "Missile Silo and Used Missile Silo have 3 defense stars."
  - "Port permits Foot, Mech, Tires, Treads, Air, Ship and Transport Ship at cost 1."
  - "Every blocked or derivative-art terrain is rejected by official-map validation."
  - "Logical terrain and render tile references are stored independently."
