cross_unit_constraints:
  roster:
    expected_enabled_unit_count: 19
    unique_ids_required: true
    all_units_must_have_sprite_mapping: true
  join:
    same_owner_required: true
    same_type_required: true
    resulting_true_hp_max: 100
    fuel_capped_at_unit_max: true
    ammo_capped_at_unit_max: true
    resulting_unit_has_acted: true
  production:
    client_cost_ignored: true
    sufficient_funds_required: true
    property_must_be_owned: true
    property_tile_must_be_empty: true
    created_unit_has_acted: true
  transport:
    nested_transport_forbidden: true
    cargo_destroyed_with_transport: true
    unloaded_unit_has_acted: true
    cargo_not_counted_as_board_occupant: true
  combat:
    damage_values_external_file: "damage-chart.yaml"
    weapon_definitions_external_file: "weapons.yaml"
    direct_units_can_counterattack_when_valid: true
    indirect_units_cannot_counterattack: true
  rendering:
    extra_sprite_rows_enabled: false
    allowed_rows:
      - 0
      - 2
      - 6
      - 8
      - 10
      - 12
      - 14
      - 16
      - 17
      - 19
      - 21
      - 25
      - 26
      - 29
      - 30
      - 32
      - 33
      - 34
      - 39
      - 40

implementation_blockers:
  - id: "sprite-mapping-approval"
    description: >
      The proposed row mapping must be visually approved before the renderer
      treats semantic names as final asset bindings.
    affects:
      - rendering
      - animation
  - id: "weapons-file"
    description: >
      weapons.yaml must define every referenced weapon ID before combat
      implementation is ready.
    affects:
      - combat
      - damage-preview
  - id: "damage-chart-file"
    description: >
      damage-chart.yaml must contain the validated AW2 matchup matrix before
      combat implementation is ready.
    affects:
      - combat
      - counterattack
  - id: "submarine-detection-verification"
    description: >
      Exact submerged detection and attack-reveal behavior must be validated
      in game-specification tests.
    affects:
      - fog-of-war
      - submarine
  - id: "cruiser-cargo-resupply-verification"
    description: >
      Confirm whether loaded copters are automatically resupplied and when.
    affects:
      - transport
      - supply
  - id: "repair-property-verification"
    description: >
      Final properties.yaml must confirm exactly which owned property types
      repair each category.
    affects:
      - repair
      - start-of-turn

required_validation_tests:
  - "Exactly 19 units are enabled."
  - "Every enabled unit ID is unique."
  - "Every weapon reference resolves in weapons.yaml."
  - "Every unit appears in damage-chart.yaml as attacker and defender where applicable."
  - "Every movement type resolves in terrain.yaml."
  - "Every production property resolves in properties.yaml."
  - "Every repair property resolves in properties.yaml."
  - "Every enabled unit has a valid approved sprite row."
  - "Air units never receive terrain defense."
  - "Indirect units cannot move and attack in the same activation."
  - "Produced units begin with full HP, fuel and ammo and are marked acted."
  - "Transport cargo type and capacity rules are enforced."
  - "Submarine state selects the correct daily fuel and sprite row."
  - "No disabled Pangea Wars row can be produced or placed in an official map."
