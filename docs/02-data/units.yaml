schema_version: "1.0.0"
document_version: "1.0.0"
document_status: "definitive-baseline"
document_purpose: >
  Canonical structured definition of every unit enabled for the Iron Grid MVP.
  This file defines unit identity, logistics, movement, production, repair,
  weapons, transport behavior, special abilities, rendering references, and
  validation constraints. Weapon-vs-target damage values do not belong here;
  they belong in damage-chart.yaml.

game_reference:
  ruleset: "Advance Wars 2: Black Hole Rising"
  roster_policy: "Only the 19 standard AW2 units represented by the approved Pangea Wars mappings."
  excluded_policy: "All additional Pangea Wars unit rows remain disabled for the MVP."

source_references:
  - id: "awbw-unit-chart"
    type: "technical-reference"
    url: "https://awbw.amarriner.com/units.php"
    covers:
      - cost
      - movement
      - ammo
      - fuel
      - daily_fuel
      - vision
      - range
      - movement_type
  - id: "wars-wiki-aw2-damage"
    type: "technical-reference"
    url: "https://warswiki.org/wiki/Damage/Advance_Wars_2_chart"
    covers:
      - roster
      - weapon_matchups
  - id: "nintendo-aw2-manual"
    type: "primary-reference"
    url: "https://www.nintendo.com/eu/media/downloads/games_8/emanuals/game_boy_advance_Wars_2BlackHoleRising_EN_DE_FR_ES_IT.pdf"
    covers:
      - unit_actions
      - capture
      - supply
      - transport
      - fuel
      - fog_of_war
      - production
      - repair
  - id: "pangea-assets-inventory"
    type: "project-reference"
    path: "docs/01-specification/assets-inventory.md"
    covers:
      - sprite_rows
      - faction_sheets
      - animation_columns
      - shadows

conventions:
  coordinate_system: "orthogonal-grid"
  hp:
    true_max: 100
    displayed_max: 10
    display_formula: "ceil(true_hp / 10)"
  direct_range:
    min: 1
    max: 1
  no_attack_range: null
  no_ammo: null
  no_weapon: null
  no_daily_fuel: 0
  action_commit_policy: "immediate-and-irreversible"
  authoritative_runtime: "server"
  asset_frame:
    width_px: 32
    height_px: 32
  sprite_sheet:
    header_height_px: 16
    row_height_px: 32
    columns: 28
  animation_columns:
    idle: [0, 1, 2, 3]
    move_side: [4, 5, 6, 7, 8]
    move_down: [9, 10, 11, 12]
    move_up: [13, 14, 15, 16]
    attack: [17, 18, 19, 20]
    hit: [21, 22, 23]
    death: [24, 25, 26, 27]
  faction_sprite_sheets:
    blue: "blue-units-sprite-sheet.png"
    green: "green-units-sprite-sheet.png"
    red: "red-units-sprite-sheet.png"
    yellow: "yellow-units-sprite-sheet.png"

enums:
  categories:
    - ground
    - air
    - naval
  movement_types:
    - foot
    - mech
    - tires
    - treads
    - air
    - ship
    - transport_ship
  combat_types:
    - none
    - direct
    - indirect
  production_properties:
    - base
    - airport
    - port
  repair_properties:
    - city
    - base
    - airport
    - port
    - headquarters
  target_domains:
    - ground
    - air
    - naval
    - submarine
    - terrain_object
  special_states:
    - surfaced
    - submerged
  unit_actions:
    - wait
    - attack
    - capture
    - supply
    - load
    - unload
    - join
    - dive
    - surface

defaults:
  max_true_hp: 100
  starts_with_full_fuel: true
  starts_with_full_ammo: true
  produced_unit_has_acted: true
  can_join_same_type: true
  can_be_loaded: true
  destroys_cargo_on_death: true
  terrain_defense_eligible: true
  receives_property_income: false
  capture_power: 0
  supply_range: 0
  transport_capacity: 0

