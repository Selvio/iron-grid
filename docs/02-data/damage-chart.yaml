matrix_integrity:
  armed_attacker_count: 16
  unit_defender_count: 19
  special_defender_count: 1
  total_defender_count: 20
  source_weapon_column_count: 22
required_engine_behavior:
- Read base damage only from this file.
- Never infer damage from weapon name, category, cost, armor or role.
- Filter weapons by ammo, range, movement, visibility and target state before automatic selection.
- Choose the legal available weapon with the highest base damage; use primary on an exact tie.
- Persist selected weapon slot and base damage in the combat replay event.
- Do not rerun selection during replay.
- A submerged Submarine can only be targeted by entries valid for submerged state.
- Pipe Seam damage uses the same combat formula unless rules.yaml defines a terrain-object exception.
cross_file_corrections:
- file: weapons.yaml
  issue: The current primary-first selection policy conflicts with AW2 dual-weapon behavior.
  required_change: Use highest-base-damage-among-available, with primary as tie-breaker.
  examples:
  - Tank vs Infantry selects Machine Gun (75), not Cannon (35).
  - Medium Tank vs Infantry selects Machine Gun (105), not Cannon (50).
  - Battle Copter vs Infantry selects Copter Machine Gun (75), not Missiles (45).
- file: units.yaml
  issue: Target-domain lists are coarse filters only.
  required_change: Use this matrix and target state as definitive attack-legality data.
required_validation_tests:
- The chart contains exactly 16 armed attackers.
- The chart contains exactly 19 unit defenders plus Pipe Seam.
- Every attacker and unit defender resolves in units.yaml.
- Every weapon ID resolves in weapons.yaml.
- Every source row contains exactly 22 weapon-column values.
- Tank vs Infantry selects secondary for 75 base damage.
- Tank vs Tank selects primary for 55 base damage.
- Mech vs Tank selects Bazooka for 55 base damage.
- Battle Copter vs Infantry selects secondary for 75 base damage.
- Cruiser vs Submarine uses primary for 90 base damage.
- Submarine vs Submarine uses primary for 55 base damage.
- Tank cannot attack a submerged Submarine.
- Bomber attacks a surfaced Submarine for 95 but cannot attack it while submerged.
- Fighter vs Bomber base damage is 100.
- Missiles vs Fighter and Bomber base damage is 120.
- Battleship vs Infantry base damage is 95.
- No transport-only unit appears as an attacker.
- Every legal entry is an integer from 1 to 125.
