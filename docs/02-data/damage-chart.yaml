schema_version: 1.0.0
document_version: 1.0.0
document_status: definitive-baseline
document_purpose: 'Canonical AW2 base-damage matrix for Iron Grid. Values are percentages

  before HP scaling, luck, commander attack/defense, terrain defense and final

  rounding. The matrix is attacker-centric and preserves primary/secondary

  weapon values, automatic weapon selection, surfaced-submarine restrictions,

  and Pipe Seam damage.'
game_reference:
  ruleset: 'Advance Wars 2: Black Hole Rising'
  matrix_scope: 19 MVP units as defenders, 16 armed MVP units as attackers, plus Pipe Seam as a destructible defender.
  source_chart: https://warswiki.org/wiki/Damage/Advance_Wars_2_chart
  source_chart_revision: oldid=30485
  source_last_edited: '2024-01-19'
source_interpretation:
  row_axis: defending unit
  column_axis: attacking unit weapon
  dash: illegal attack / no damage entry
  parentheses_non_submarine: alternate weapon value shown by the source chart; automatic combat uses the available
    weapon with the highest base damage
  parentheses_submarine: attack is available only while the Submarine is surfaced; submerged Submarines require
    an entry valid in submerged state
conventions:
  value_unit: percentage points
  valid_range:
  - 1
  - 125
  null_means: attack is illegal with that weapon against that defender/state
  automatic_weapon_selection: Among currently available legal weapon slots, choose the slot with the highest base
    damage. On an exact tie, choose primary. Exclude finite-ammo weapons when ammo is zero.
  damage_formula_location: rules.yaml and game-specification.md
  weapon_metadata_location: weapons.yaml
  unit_metadata_location: units.yaml
  submarine_states:
  - surfaced
  - submerged
  pipe_seam_is_unit: false
